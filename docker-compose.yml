services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dashflo
      POSTGRES_PASSWORD: dashflo
      POSTGRES_DB: dashflo
    ports:
      - "5433:5432"
    volumes:
      - dashflo_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dashflo"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

volumes:
  dashflo_pg:
